<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Performance — AutoGrade</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="/static/css/dashboard.css"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0c0f1a;--surface:#131725;--surface2:#1a1f32;--border:#1e2538;--border2:#252d45;--accent:#4f8ef7;--accent2:#7c3aed;--text:#e8ecf5;--muted:#6b7496;--error:#f87171;--success:#34d399;--warning:#fbbf24}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 50% 40% at 5% 5%,rgba(79,142,247,.06) 0%,transparent 60%),radial-gradient(ellipse 40% 50% at 95% 95%,rgba(124,58,237,.06) 0%,transparent 60%);pointer-events:none;z-index:0}
    nav{position:sticky;top:0;z-index:100;background:rgba(12,15,26,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between}
    .nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
    .logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
    .logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;color:var(--text);letter-spacing:-.5px}
    .nav-links{display:flex;align-items:center;gap:8px}
    .nav-link{color:var(--muted);text-decoration:none;font-size:14px;font-weight:500;padding:6px 12px;border-radius:8px;transition:color .2s,background .2s}
    .nav-link:hover{color:var(--text);background:var(--surface)}.nav-link.active{color:var(--accent)}
    .nav-btn{background:var(--surface);border:1px solid var(--border);color:var(--muted);font-size:13px;font-family:'DM Sans',sans-serif;padding:6px 14px;border-radius:8px;cursor:pointer;transition:color .2s}
    .nav-btn:hover{color:var(--error)}
    .page{position:relative;z-index:1;max-width:960px;margin:0 auto;padding:40px 24px 80px}
    .page-top{margin-bottom:32px}
    .page-top h1{font-family:'Syne',sans-serif;font-weight:700;font-size:28px;letter-spacing:-.5px;margin-bottom:4px}
    .page-top p{font-size:14px;color:var(--muted)}
    .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:32px}
    .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px 22px;animation:fadeUp .4s ease both}
    .stat-card:nth-child(1){animation-delay:.05s}.stat-card:nth-child(2){animation-delay:.1s}.stat-card:nth-child(3){animation-delay:.15s}.stat-card:nth-child(4){animation-delay:.2s}
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    .stat-label{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px}
    .stat-value{font-family:'Syne',sans-serif;font-weight:700;font-size:28px;letter-spacing:-1px}
    .stat-value.blue{color:var(--accent)}.stat-value.green{color:var(--success)}.stat-value.yellow{color:var(--warning)}.stat-value.purple{color:#a78bfa}
    .charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:28px}
    .chart-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;animation:fadeUp .4s ease .2s both}
    .chart-card.full{grid-column:1/-1}
    .chart-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin-bottom:20px}
    .chart-wrap{position:relative;height:220px}
    .chart-wrap.tall{height:280px}
    .section-title{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
    .history-table{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:24px}
    .table-header{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr;padding:12px 20px;border-bottom:1px solid var(--border);font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--muted)}
    .table-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr;padding:13px 20px;border-bottom:1px solid var(--border);align-items:center;font-size:14px;transition:background .2s}
    .table-row:last-child{border-bottom:none}.table-row:hover{background:var(--surface2)}
    .badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500}
    .badge.published{background:rgba(52,211,153,.12);color:var(--success)}
    .badge.pending{background:rgba(251,191,36,.12);color:var(--warning)}
    .badge.processing{background:rgba(79,142,247,.12);color:var(--accent)}
    .trend-up{color:var(--success);font-size:13px;font-weight:600}
    .trend-down{color:var(--error);font-size:13px;font-weight:600}
    .trend-same{color:var(--muted);font-size:13px}
    .empty-state{text-align:center;padding:60px 24px;color:var(--muted)}
    .empty-icon{font-size:48px;margin-bottom:16px}
    .empty-state h3{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;margin-bottom:8px;color:var(--text)}
    @media(max-width:700px){.charts-grid{grid-template-columns:1fr}.stats-row{grid-template-columns:1fr 1fr}.table-header,.table-row{grid-template-columns:2fr 1fr 1fr}.table-header>*:nth-child(4),.table-row>*:nth-child(4),.table-header>*:nth-child(5),.table-row>*:nth-child(5){display:none}nav{padding:0 16px}.page{padding:24px 16px 60px}}
  </style>
</head>
<body>
  <nav>
    <a href="/static/pages/student-dashboard.html" class="nav-logo"><div class="logo-icon">✦</div><span class="logo-text">AutoGrade</span></a>
    <div class="nav-links">
      <a href="/static/pages/student-dashboard.html" class="nav-link">My Tests</a>
      <a href="/static/pages/performance.html" class="nav-link active">Performance</a>
      <div class="profile-wrap" onclick="toggleProfile()" id="profileWrap">
        <div class="avatar student" id="profileAvatar"><div class="avatar-pulse"></div>S</div>
        <div class="profile-info"><div class="profile-name" id="profileName">Student</div><div class="profile-role student">Student</div></div>
        <div class="profile-dropdown" id="profileDropdown">
          <div class="pd-header"><div class="pd-avatar student" id="pdAvatar">S</div><div><div class="pd-name" id="pdName">Student</div><div class="pd-email" id="pdEmail"></div></div></div>
          <div class="pd-body"><div class="pd-divider"></div><button class="pd-item pd-logout" onclick="handleLogout()"><span class="pd-icon">🚪</span>Logout</button></div>
        </div>
      </div>
    </div>
  </nav>

  <div class="page">
    <div class="page-top">
      <h1>My Performance</h1>
      <p>Track your scores and improvement across all tests</p>
    </div>

    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">Tests Taken</div><div class="stat-value blue" id="sTaken">—</div></div>
      <div class="stat-card"><div class="stat-label">Average Score</div><div class="stat-value green" id="sAvg">—%</div></div>
      <div class="stat-card"><div class="stat-label">Best Score</div><div class="stat-value purple" id="sBest">—%</div></div>
      <div class="stat-card"><div class="stat-label">Improvement</div><div class="stat-value yellow" id="sTrend">—</div></div>
    </div>

    <div id="mainContent">
      <div class="empty-state"><div class="empty-icon">📊</div><h3>Loading...</h3></div>
    </div>
  </div>

  <script>
    async function handleLogout(){try{await fetch('/logout',{method:'POST'});}catch(_){}window.location.href='/static/pages/login.html';}

    function getColor(pct){ return pct>=80?'#34d399':pct>=60?'#4f8ef7':pct>=40?'#fbbf24':'#f87171'; }

    async function load(){
      try{
        const res = await fetch('/student/performance');
        if(res.status===401){window.location.href='/static/pages/login.html';return;}
        const data = await res.json();
        const published = data.results.filter(r=>r.percentage!==null);

        if(!published.length){
          document.getElementById('mainContent').innerHTML=`
            <div class="empty-state">
              <div class="empty-icon">📈</div>
              <h3>No results yet</h3>
              <p>Complete tests and wait for results to be published to see your performance graphs.</p>
            </div>`;
          document.getElementById('sTaken').textContent=data.total_tests;
          document.getElementById('sAvg').textContent='—';
          document.getElementById('sBest').textContent='—';
          document.getElementById('sTrend').textContent='—';
          return;
        }

        const avg = data.average_percentage;
        const best = Math.max(...published.map(r=>r.percentage));
        const trend = published.length>=2
          ? published[published.length-1].percentage - published[published.length-2].percentage
          : 0;

        document.getElementById('sTaken').textContent=data.total_tests;
        document.getElementById('sAvg').textContent=avg+'%';
        document.getElementById('sBest').textContent=best+'%';
        const tEl=document.getElementById('sTrend');
        if(trend>0){tEl.textContent='▲ '+trend.toFixed(1)+'%';tEl.style.color='var(--success)';}
        else if(trend<0){tEl.textContent='▼ '+Math.abs(trend).toFixed(1)+'%';tEl.style.color='var(--error)';}
        else{tEl.textContent='→ Stable';tEl.style.color='var(--muted)';}

        document.getElementById('mainContent').innerHTML=`
          <div class="charts-grid">
            <div class="chart-card full">
              <div class="chart-title">📈 Score Improvement Over Time</div>
              <div class="chart-wrap tall"><canvas id="lineChart"></canvas></div>
            </div>
            <div class="chart-card">
              <div class="chart-title">📊 Score per Test (Bar)</div>
              <div class="chart-wrap"><canvas id="barChart"></canvas></div>
            </div>
            <div class="chart-card">
              <div class="chart-title">🍩 Score Distribution</div>
              <div class="chart-wrap"><canvas id="doughnutChart"></canvas></div>
            </div>
          </div>
          <div class="section-title">Test History</div>
          <div class="history-table">
            <div class="table-header"><span>Test</span><span>Subject</span><span>Score</span><span>Grade</span><span>Status</span></div>
            <div id="historyBody"></div>
          </div>`;

        const labels = published.map(r=>r.test_title.length>20?r.test_title.slice(0,18)+'…':r.test_title);
        const scores = published.map(r=>r.percentage);
        const colors = scores.map(s=>getColor(s));

        const chartDefaults = {
          plugins:{legend:{display:false},tooltip:{backgroundColor:'#131725',borderColor:'#1e2538',borderWidth:1,titleColor:'#e8ecf5',bodyColor:'#6b7496'}},
          scales:{x:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#6b7496',font:{family:'DM Sans'}}},
                  y:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#6b7496',font:{family:'DM Sans'}},min:0,max:100}}
        };

        // Line chart
        new Chart(document.getElementById('lineChart'),{
          type:'line',
          data:{labels,datasets:[{
            label:'Score %', data:scores,
            borderColor:'#4f8ef7', backgroundColor:'rgba(79,142,247,.1)',
            pointBackgroundColor:colors, pointRadius:6, pointHoverRadius:8,
            fill:true, tension:.4, borderWidth:2
          }]},
          options:{...chartDefaults, plugins:{...chartDefaults.plugins,
            legend:{display:false},
            annotation:{annotations:{line:{type:'line',yMin:avg,yMax:avg,borderColor:'rgba(52,211,153,.4)',borderWidth:1,borderDash:[4,4]}}}
          }}
        });

        // Bar chart
        new Chart(document.getElementById('barChart'),{
          type:'bar',
          data:{labels,datasets:[{
            label:'Score %', data:scores,
            backgroundColor:colors.map(c=>c+'99'),
            borderColor:colors, borderWidth:1, borderRadius:6
          }]},
          options:chartDefaults
        });

        // Doughnut
        const ranges = [
          {label:'Excellent (80-100)',count:scores.filter(s=>s>=80).length,color:'#34d399'},
          {label:'Good (60-79)',count:scores.filter(s=>s>=60&&s<80).length,color:'#4f8ef7'},
          {label:'Average (40-59)',count:scores.filter(s=>s>=40&&s<60).length,color:'#fbbf24'},
          {label:'Poor (<40)',count:scores.filter(s=>s<40).length,color:'#f87171'},
        ].filter(r=>r.count>0);

        new Chart(document.getElementById('doughnutChart'),{
          type:'doughnut',
          data:{labels:ranges.map(r=>r.label),datasets:[{data:ranges.map(r=>r.count),backgroundColor:ranges.map(r=>r.color+'cc'),borderColor:ranges.map(r=>r.color),borderWidth:1}]},
          options:{plugins:{legend:{display:true,position:'bottom',labels:{color:'#6b7496',font:{family:'DM Sans'},padding:12}},tooltip:{backgroundColor:'#131725',borderColor:'#1e2538',borderWidth:1,titleColor:'#e8ecf5',bodyColor:'#6b7496'}},cutout:'65%'}
        });

        // History table
        const body = document.getElementById('historyBody');
        body.innerHTML = data.results.map((r,i)=>{
          const prev = data.results[i-1];
          let trendHtml = '<span class="trend-same">—</span>';
          if(r.percentage!==null && prev && prev.percentage!==null){
            const diff = r.percentage - prev.percentage;
            if(diff>0) trendHtml=`<span class="trend-up">▲ ${diff.toFixed(1)}%</span>`;
            else if(diff<0) trendHtml=`<span class="trend-down">▼ ${Math.abs(diff).toFixed(1)}%</span>`;
            else trendHtml='<span class="trend-same">→</span>';
          }
          const grade = r.percentage>=80?'A':r.percentage>=60?'B':r.percentage>=40?'C':r.percentage!==null?'D':'—';
          const gradeColor = r.percentage>=80?'var(--success)':r.percentage>=60?'var(--accent)':r.percentage>=40?'var(--warning)':'var(--error)';
          return `<div class="table-row">
            <span style="font-weight:500">${r.test_title}</span>
            <span style="color:var(--muted);font-size:13px">${r.subject||'—'}</span>
            <span style="color:${r.percentage!==null?getColor(r.percentage):'var(--muted)'};font-weight:600">${r.percentage!==null?r.percentage+'%':'Pending'}</span>
            <span style="color:${gradeColor};font-family:Syne,sans-serif;font-weight:700">${grade}</span>
            <span><span class="badge ${r.status}">${r.status}</span></span>
          </div>`;
        }).join('');

      }catch(err){
        document.getElementById('mainContent').innerHTML='<div class="empty-state"><div class="empty-icon">⚠️</div><h3>Could not load performance</h3><p>Make sure you are logged in.</p></div>';
      }
    }
    load();
    async function loadProfile(){try{const res=await fetch('/me');const d=await res.json();document.getElementById('profileAvatar').innerHTML='<div class="avatar-pulse"></div>'+d.initials;document.getElementById('profileName').textContent=d.name.split(' ')[0];document.getElementById('pdAvatar').textContent=d.initials;document.getElementById('pdName').textContent=d.name;document.getElementById('pdEmail').textContent=d.email;}catch(e){}}
    function toggleProfile(){document.getElementById('profileDropdown').classList.toggle('show');}
    document.addEventListener('click',e=>{const pw=document.getElementById('profileWrap');if(pw&&!pw.contains(e.target))document.getElementById('profileDropdown').classList.remove('show');});
    loadProfile();
  </script>
  <script src="/static/js/profile.js"></script>
</body>
</html>
