<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — AutoGrade</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#060810;--accent:#4f8ef7;--accent2:#7c3aed;--text:#f0f4ff;--muted:#8892b0;--error:#f87171;--success:#34d399}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .bg-orbs{position:fixed;inset:0;pointer-events:none}
    .orb{position:absolute;border-radius:50%;filter:blur(80px)}
    .orb1{width:600px;height:600px;background:radial-gradient(circle,rgba(124,58,237,.2),transparent 70%);top:-200px;right:-200px}
    .orb2{width:500px;height:500px;background:radial-gradient(circle,rgba(79,142,247,.15),transparent 70%);bottom:-150px;left:-150px}
    .grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(79,142,247,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(79,142,247,.03) 1px,transparent 1px);background-size:60px 60px;pointer-events:none}
    .card{position:relative;z-index:1;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:24px;padding:44px;width:100%;max-width:460px;backdrop-filter:blur(20px);box-shadow:0 32px 80px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.08);animation:slideUp .5s cubic-bezier(.16,1,.3,1) both}
    @keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
    .logo{display:flex;align-items:center;gap:12px;margin-bottom:32px}
    .logo-icon{width:42px;height:42px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 0 24px rgba(79,142,247,.5)}
    .logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;letter-spacing:-.5px}
    h1{font-family:'Syne',sans-serif;font-weight:700;font-size:26px;letter-spacing:-.5px;margin-bottom:6px}
    .subtitle{font-size:14px;color:var(--muted);margin-bottom:28px}
    .field{margin-bottom:16px}
    label{display:block;font-size:13px;font-weight:500;color:var(--muted);margin-bottom:7px;letter-spacing:.3px}
    .input-wrap{position:relative}
    .input-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none}
    input{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:12px 16px 12px 42px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);outline:none;transition:all .2s}
    input:focus{border-color:rgba(79,142,247,.6);background:rgba(79,142,247,.06);box-shadow:0 0 0 4px rgba(79,142,247,.1)}
    input::placeholder{color:var(--muted);opacity:.6}
    .role-label{font-size:13px;font-weight:500;color:var(--muted);margin-bottom:10px;letter-spacing:.3px}
    .role-toggle{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
    .role-option{position:relative}
    .role-option input[type="radio"]{position:absolute;opacity:0;width:0;height:0}
    .role-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;border:1px solid rgba(255,255,255,.1);border-radius:12px;cursor:pointer;font-size:14px;font-weight:500;color:var(--muted);background:rgba(255,255,255,.03);transition:all .2s;user-select:none}
    .role-option input[type="radio"]:checked+.role-btn{border-color:var(--accent);color:var(--accent);background:rgba(79,142,247,.1);box-shadow:0 0 0 3px rgba(79,142,247,.1)}
    .btn{width:100%;padding:14px;border:none;border-radius:12px;font-family:'Syne',sans-serif;font-weight:700;font-size:15px;cursor:pointer;margin-top:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;transition:all .2s;box-shadow:0 8px 24px rgba(79,142,247,.3)}
    .btn:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(79,142,247,.4)}
    .btn:active{transform:scale(.98)}.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
    .alert{padding:12px 16px;border-radius:12px;font-size:13.5px;margin-bottom:16px;display:none;animation:fadeIn .3s ease}
    .alert.error{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.25);color:var(--error)}
    .alert.success{background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.25);color:var(--success)}
    .alert.show{display:block}
    @keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
    .footer-link{text-align:center;margin-top:20px;font-size:14px;color:var(--muted)}
    .footer-link a{color:var(--accent);text-decoration:none;font-weight:600}
    .footer-link a:hover{text-decoration:underline}
    .spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;margin-right:8px;vertical-align:middle}
    @keyframes spin{to{transform:rotate(360deg)}}
    .back-link{display:inline-flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:13px;margin-bottom:20px;transition:color .2s}
    .back-link:hover{color:var(--text)}
    #extraField{display:none}
  </style>
</head>
<body>
  <div class="bg-orbs"><div class="orb orb1"></div><div class="orb orb2"></div></div>
  <div class="grid-bg"></div>
  <div class="card">
    <a href="/" class="back-link">← Back to Home</a>
    <div class="logo"><div class="logo-icon">✦</div><span class="logo-text">AutoGrade</span></div>
    <h1>Create Account</h1>
    <p class="subtitle">Register and wait for admin approval to get access</p>
    <div class="alert error" id="errorAlert"></div>
    <div class="alert success" id="successAlert"></div>
    <div class="field">
      <label>Full Name</label>
      <div class="input-wrap"><span class="input-icon">👤</span><input type="text" id="name" placeholder="Your full name"/></div>
    </div>
    <div class="field">
      <label>Email Address</label>
      <div class="input-wrap"><span class="input-icon">✉️</span><input type="email" id="email" placeholder="you@example.com"/></div>
    </div>
    <div class="field">
      <label>Password</label>
      <div class="input-wrap"><span class="input-icon">🔒</span><input type="password" id="password" placeholder="Min. 6 characters"/></div>
    </div>
    <div class="field">
      <div class="role-label">I am a</div>
      <div class="role-toggle">
        <div class="role-option"><input type="radio" name="role" id="roleStudent" value="student" checked onchange="toggleExtra()"/><label class="role-btn" for="roleStudent">🎓 Student</label></div>
        <div class="role-option"><input type="radio" name="role" id="roleTeacher" value="teacher" onchange="toggleExtra()"/><label class="role-btn" for="roleTeacher">🧑🏫 Teacher</label></div>
      </div>
    </div>
    <div class="field" id="extraField">
      <label id="extraLabel">Student ID</label>
      <div class="input-wrap"><span class="input-icon">🪪</span><input type="text" id="extraId" placeholder="Enter your ID"/></div>
    </div>
    <button class="btn" id="registerBtn" onclick="handleRegister()">Request Access</button>
    <div class="footer-link">Already have an account? <a href="/static/pages/login.html">Sign in</a></div>
  </div>
  <script>
    toggleExtra();
    function toggleExtra(){
      const role=document.querySelector('input[name="role"]:checked').value;
      const f=document.getElementById('extraField');
      const l=document.getElementById('extraLabel');
      f.style.display='block';
      l.textContent=role==='teacher'?'Employee ID':'Student ID';
      document.getElementById('extraId').placeholder=role==='teacher'?'e.g. EMP001':'e.g. STU001';
    }
    function showAlert(type,msg){
      const el=document.getElementById(type==='error'?'errorAlert':'successAlert');
      const other=document.getElementById(type==='error'?'successAlert':'errorAlert');
      other.classList.remove('show');el.textContent=msg;el.classList.add('show');
    }
    async function handleRegister(){
      const btn=document.getElementById('registerBtn');
      const name=document.getElementById('name').value.trim();
      const email=document.getElementById('email').value.trim();
      const password=document.getElementById('password').value;
      const role=document.querySelector('input[name="role"]:checked').value;
      const extraId=document.getElementById('extraId').value.trim();
      if(!name||!email||!password){showAlert('error','Please fill in all fields.');return;}
      if(password.length<6){showAlert('error','Password must be at least 6 characters.');return;}
      btn.disabled=true;btn.innerHTML='<span class="spinner"></span>Sending request...';
      const body={name,email,password,role};
      if(role==='teacher') body.employee_id=extraId; else body.student_id=extraId;
      try{
        const res=await fetch('/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
        const data=await res.json();
        if(res.ok){showAlert('success','✅ Request sent! Wait for admin approval before logging in.');}
        else{showAlert('error',data.error||'Registration failed.');}
        btn.disabled=false;btn.textContent='Request Access';
      }catch(err){showAlert('error','Network error.');btn.disabled=false;btn.textContent='Request Access';}
    }
  </script>
</body>
</html>
